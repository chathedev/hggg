<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Np9Ma — Del C &amp; D</title>
<style>
  :root {
    --bg: #fafaf9;
    --fg: #18181b;
    --muted: #71717a;
    --border: #e4e4e7;
    --surface: #ffffff;
    --hover: #f4f4f5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0a;
      --fg: #fafafa;
      --muted: #a1a1aa;
      --border: #27272a;
      --surface: #161616;
      --hover: #1f1f23;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: .875rem 1.25rem;
    background: color-mix(in srgb, var(--surface) 92%, transparent);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .back, .download {
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    color: var(--fg);
    text-decoration: none;
    font-size: .9375rem;
    font-weight: 500;
    padding: .5rem .75rem;
    border-radius: 8px;
    transition: background .2s ease;
  }
  .back:hover, .download:hover { background: var(--hover); }
  .download { color: var(--muted); font-weight: 400; font-size: .875rem; }
  .title {
    font-size: .9375rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .title span { color: var(--muted); font-weight: 400; }
  main {
    flex: 1;
    padding: 2rem 1rem 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
  }
  .page {
    width: 100%;
    max-width: 56rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 12px 28px rgba(0,0,0,.06);
    overflow: hidden;
    position: relative;
  }
  .page canvas { display: block; width: 100%; height: auto; }
  .page .skeleton {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(0,0,0,.05), transparent) 0/200% 100%;
    animation: shimmer 1.4s linear infinite;
    aspect-ratio: 1 / 1.4;
  }
  @media (prefers-color-scheme: dark) {
    .page .skeleton { background: linear-gradient(90deg, transparent, rgba(255,255,255,.04), transparent) 0/200% 100%; }
  }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .fallback {
    text-align: center;
    color: var(--muted);
    padding: 2rem;
    font-size: .9375rem;
  }
  .fallback a { color: var(--fg); }
  @media (max-width: 520px) {
    .title span { display: none; }
    main { padding: 1rem .5rem 3rem; }
  }
</style>
</head>
<body>
  <header>
    <a class="back" href="index.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Tillbaka
    </a>
    <div class="title">Del C &amp; D <span>· Np9Ma 2025/2026</span></div>
    <a class="download" href="Np9Ma%202025%202026%20del%20C%20och%20D.pdf" download>Ladda ner</a>
  </header>

  <main id="viewer">
    <div class="page"><div class="skeleton"></div></div>
  </main>

  <script type="module">
    import * as pdfjs from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.min.mjs";
    pdfjs.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.worker.min.mjs";

    const PDF_URL = "Np9Ma 2025 2026 del C och D.pdf";
    const viewer = document.getElementById("viewer");

    (async () => {
      try {
        const pdf = await pdfjs.getDocument(PDF_URL).promise;
        viewer.innerHTML = "";
        const dpr = window.devicePixelRatio || 1;
        for (let n = 1; n <= pdf.numPages; n++) {
          const page = await pdf.getPage(n);
          const wrap = document.createElement("div");
          wrap.className = "page";
          const canvas = document.createElement("canvas");
          wrap.appendChild(canvas);
          viewer.appendChild(wrap);

          const cssWidth = wrap.clientWidth;
          const base = page.getViewport({ scale: 1 });
          const scale = (cssWidth / base.width) * dpr;
          const viewport = page.getViewport({ scale });
          canvas.width = Math.floor(viewport.width);
          canvas.height = Math.floor(viewport.height);
          await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
        }
      } catch (err) {
        console.error(err);
        viewer.innerHTML = `<div class="fallback">Kunde inte ladda PDF. <a href="Np9Ma%202025%202026%20del%20C%20och%20D.pdf">Öppna direkt</a></div>`;
      }
    })();
  </script>
</body>
</html>
