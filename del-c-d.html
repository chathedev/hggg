  }
  @media (prefers-color-scheme: dark) {

      --fg: #fafafa;
      --muted: #a1a1aa;
      --border: #27272a;

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    flex-direction: column;
    height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: .875rem 1.25rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .back {
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    color: var(--fg);
    text-decoration: none;
    font-size: .9375rem;
    font-weight: 500;
    padding: .5rem .75rem;
    border-radius: 8px;
    transition: background .2s ease;
  }
  .back:hover { background: var(--bg); }
  .title {
    font-size: .9375rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .title span { color: var(--muted); font-weight: 400; }
  .download {
    color: var(--muted);
    text-decoration: none;
    font-size: .875rem;
    padding: .5rem .75rem;
    border-radius: 8px;
    transition: background .2s ease, color .2s ease;
  }
  .download:hover { background: var(--bg); color: var(--fg); }
  main {
    flex: 1;
    min-height: 0;
    background: var(--bg);
  }
  iframe, embed {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  @media (max-width: 520px) {
    .title span { display: none; }
  }
</style>
