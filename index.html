<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Np9Ma 2025/2026</title>
<style>
  :root {
    --bg: #fafaf9;
    --fg: #18181b;
    --muted: #71717a;
    --card: #ffffff;
    --border: #e4e4e7;
    --accent: #18181b;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
    --shadow-hover: 0 2px 4px rgba(0,0,0,.06), 0 16px 40px rgba(0,0,0,.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0a;
      --fg: #fafafa;
      --muted: #a1a1aa;
      --card: #161616;
      --border: #27272a;
      --accent: #fafafa;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.4);
      --shadow-hover: 0 2px 4px rgba(0,0,0,.4), 0 16px 40px rgba(0,0,0,.6);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4rem 1.5rem 3rem;
    -webkit-font-smoothing: antialiased;
  }
  header {
    text-align: center;
    margin-bottom: 3rem;
    max-width: 40rem;
  }
  h1 {
    font-size: clamp(1.75rem, 4vw, 2.5rem);
    font-weight: 600;
    letter-spacing: -0.025em;
    margin: 0 0 .5rem;
  }
  .subtitle {
    color: var(--muted);
    font-size: 1rem;
    margin: 0;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
    width: 100%;
    max-width: 64rem;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow);
    transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-hover);
    border-color: var(--fg);
  }
  .preview {
    position: relative;
    aspect-ratio: 1 / 1.3;
    background: #f4f4f5;
    overflow: hidden;
  }
  @media (prefers-color-scheme: dark) {
    .preview { background: #1f1f23; }
  }
  .preview embed,
  .preview object,
  .preview iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    pointer-events: none;
  }
  .preview::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,.04));
    pointer-events: none;
  }
  .meta {
    padding: 1.25rem 1.5rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .meta-text { min-width: 0; }
  .label {
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin: 0 0 .25rem;
  }
  .title {
    font-size: 1.125rem;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .arrow {
    flex-shrink: 0;
    width: 2rem;
    height: 2rem;
    border-radius: 999px;
    background: var(--bg);
    border: 1px solid var(--border);
    display: grid;
    place-items: center;
    transition: background .2s ease, color .2s ease, border-color .2s ease;
  }
  .card:hover .arrow {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  footer {
    margin-top: 3rem;
    color: var(--muted);
    font-size: .8125rem;
  }
</style>
</head>
<body>
  <header>
    <h1>Np9Ma 2025/2026</h1>
    <p class="subtitle">Nationellt prov i matematik — välj del</p>
  </header>

  <main class="grid">
    <a class="card" href="del-a-b.html">
      <div class="preview">
        <embed src="np9ma_2025_2026_del%20A%20och%20B.pdf#toolbar=0&navpanes=0&scrollbar=0&view=FitH" type="application/pdf" />
      </div>
      <div class="meta">
        <div class="meta-text">
          <p class="label">Del 1</p>
          <p class="title">Del A &amp; B</p>
        </div>
        <span class="arrow" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </span>
      </div>
    </a>

    <a class="card" href="del-c-d.html">
      <div class="preview">
        <embed src="Np9Ma%202025%202026%20del%20C%20och%20D.pdf#toolbar=0&navpanes=0&scrollbar=0&view=FitH" type="application/pdf" />
      </div>
      <div class="meta">
        <div class="meta-text">
          <p class="label">Del 2</p>
          <p class="title">Del C &amp; D</p>
        </div>
        <span class="arrow" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </span>
      </div>
    </a>
  </main>

  <footer>Klicka på en del för att öppna</footer>
</body>
</html>
